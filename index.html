<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>متجر Rixos Pi</title>
</head>
<body>

<h1>مرحبا بك في متجر Rixos</h1>

<!-- زر تسجيل دخول Pi -->
<button id="loginBtn">Login with Pi</button>

<!-- قائمة المنتجات -->
<div id="products" style="display:none">
  <div>
    <h2>منتج 1</h2>
    <p>السعر: 0.01 Pi</p>
    <button class="payBtn" data-amount="0.01" data-product="منتج 1">ادفع الآن</button>
  </div>
  <div>
    <h2>منتج 2</h2>
    <p>السعر: 0.02 Pi</p>
    <button class="payBtn" data-amount="0.02" data-product="منتج 2">ادفع الآن</button>
  </div>
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
Pi.init({ version: "2.0", sandbox: true }); // وضع Sandbox للتجربة

let user = null;

// تسجيل الدخول
document.getElementById("loginBtn").onclick = async function() {
  try {
    user = await Pi.authenticate(['username', 'payments']);
    alert(`مرحباً ${user?.username || "مستخدم Pi"}`);
    document.getElementById("loginBtn").style.display = 'none';
    document.getElementById("products").style.display = 'block';
  } catch(err) {
    console.error(err);
    alert('فشل تسجيل الدخول');
  }
};

// التعامل مع كل زر دفع
document.querySelectorAll(".payBtn").forEach(btn => {
  btn.onclick = async function() {
    const amount = parseFloat(btn.dataset.amount);
    const product = btn.dataset.product;

    try {
      // جلب بيانات الدفع من Netlify Function
      const res = await fetch("/.netlify/functions/create-payment");
      const data = await res.json();

      // إنشاء الدفع
      Pi.createPayment({
        amount: amount, // أو data.amount لو عايز من Function
        memo: `دفع ${product}`,
        metadata: { product },

        onReadyForServerApproval(paymentId) {
          console.log("Ready for approval:", paymentId);
        },
        onReadyForServerCompletion(paymentId, txid) {
          alert(`تم الدفع بنجاح! المنتج: ${product}`);
          console.log("Payment complete:", paymentId, txid);
        },
        onCancel(paymentId) {
          alert("تم إلغاء الدفع");
        },
        onError(error) {
          console.error(error);
          alert("حدث خطأ أثناء الدفع: " + error.message);
        }
      });
    } catch(err) {
      console.error(err);
      alert("فشل إنشاء الدفع");
    }
  }
});
</script>

</body>
</html>
