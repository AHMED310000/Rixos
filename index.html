<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Rixos Pi Store</title>
</head>
<body>

<h1>مرحبا بك في متجر Rixos</h1>

<!-- زر تسجيل دخول Pi -->
<button id="loginBtn">Login with Pi</button>

<!-- زر الدفع -->
<button id="payBtn" style="display:none">Pay 0.01 Pi</button>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
// تفعيل Pi SDK مع Sandbox للتجربة
Pi.init({ version: "2.0", sandbox: true });

let user = null;

// تسجيل الدخول في Pi
document.getElementById("loginBtn").onclick = async function() {
  try {
    user = await Pi.authenticate(['username', 'payments']);
    alert(`مرحباً ${user?.username || "مستخدم Pi"}`);
    document.getElementById("loginBtn").style.display = 'none';
    document.getElementById("payBtn").style.display = 'inline';
  } catch(err) {
    console.error(err);
    alert('فشل تسجيل الدخول');
  }
};

// الدفع
document.getElementById("payBtn").onclick = async function() {
  try {
    // جلب بيانات الدفع من Netlify Function
    const res = await fetch("/.netlify/functions/create-payment");
    const data = await res.json();

    // إنشاء الدفع عبر Pi SDK
    Pi.createPayment({
      amount: data.amount,
      memo: data.memo,
      metadata: { product: "Rixos Test" },

      onReadyForServerApproval: function(paymentId) {
        console.log("Ready for approval:", paymentId);
      },

      onReadyForServerCompletion: function(paymentId, txid) {
        alert("تم الدفع بنجاح!");
        console.log("Payment complete:", paymentId, txid);
      },

      onCancel: function(paymentId) {
        alert("تم إلغاء الدفع");
      },

      onError: function(error) {
        console.error(error);
        alert("حدث خطأ أثناء الدفع: " + error.message);
      }
    });
  } catch(err) {
    console.error(err);
    alert("فشل إنشاء الدفع");
  }
};
</script>

</body>
</html>
